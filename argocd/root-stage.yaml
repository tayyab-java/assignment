apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: root
  source:
    repoURL: https://github.com/tayyab-java/assignment.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: false
      include: "{sample-app-stage,kyverno-policies}.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
