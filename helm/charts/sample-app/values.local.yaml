envFromSecret: sample-app-env

# whoami binds to port 80 as non-root; NET_BIND_SERVICE is required when capabilities.drop: [ALL].
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
